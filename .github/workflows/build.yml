name: Build scrcpy with Side Panel

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Build for Windows x64 (cross-compiled from Ubuntu)
  # ─────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64 (cross-compile)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cross-compile toolchain & dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 \
            meson ninja-build pkg-config \
            python3 git wget unzip

      - name: Download prebuilt Windows deps (SDL3, FFmpeg)
        run: |
          mkdir -p win-deps
          cd win-deps

          # SDL3
          wget -q https://github.com/libsdl-org/SDL/releases/download/release-3.2.14/SDL3-devel-3.2.14-mingw.tar.gz
          tar xf SDL3-devel-3.2.14-mingw.tar.gz
          mv SDL3-3.2.14/x86_64-w64-mingw32 SDL3

          # FFmpeg (BtbN build - win64 shared)
          wget -q "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          unzip -q ffmpeg-master-latest-win64-gpl-shared.zip
          mv ffmpeg-master-latest-win64-gpl-shared FFmpeg

      - name: Apply side-panel patch
        run: |
          python3 apply_panel_patch.py

      - name: Generate cross-compile file for Windows
        run: |
          DEPS=$PWD/win-deps
          cat > cross_win64_ci.txt << EOF
          [binaries]
          c       = 'x86_64-w64-mingw32-gcc'
          cpp     = 'x86_64-w64-mingw32-g++'
          ar      = 'x86_64-w64-mingw32-ar'
          strip   = 'x86_64-w64-mingw32-strip'
          windres = 'x86_64-w64-mingw32-windres'
          pkgconfig = 'pkg-config'

          [host_machine]
          system     = 'windows'
          cpu_family = 'x86_64'
          cpu        = 'x86_64'
          endian     = 'little'

          [built-in options]
          c_args   = ['-I${DEPS}/SDL3/include', '-I${DEPS}/FFmpeg/include']
          c_link_args = ['-L${DEPS}/SDL3/lib', '-L${DEPS}/FFmpeg/lib']

          [properties]
          pkg_config_libdir = '${DEPS}/SDL3/lib/pkgconfig'
          EOF

      - name: Configure (meson)
        run: |
          export PKG_CONFIG_PATH="$PWD/win-deps/SDL3/lib/pkgconfig"
          export PKG_CONFIG_LIBDIR="$PWD/win-deps/SDL3/lib/pkgconfig"
          meson setup build-win \
            --cross-file cross_win64_ci.txt \
            --buildtype=release \
            -Db_lto=false \
            -Dcompile_server=false \
            -Dc_args="-I$PWD/win-deps/SDL3/include -I$PWD/win-deps/FFmpeg/include" \
            -Dc_link_args="-L$PWD/win-deps/SDL3/lib -L$PWD/win-deps/FFmpeg/lib -lSDL3 -lavformat -lavcodec -lavutil -lswresample"

      - name: Build
        run: |
          cd build-win
          ninja -j$(nproc)

      - name: Copy runtime DLLs
        run: |
          DEPS=$PWD/win-deps
          mkdir -p release-win
          cp build-win/app/scrcpy.exe         release-win/ 2>/dev/null || true
          cp "$DEPS/SDL3/bin/SDL3.dll"         release-win/
          cp "$DEPS/FFmpeg/bin/"*.dll          release-win/
          echo '{}' > release-win/devices_data.json
          mkdir -p release-win/Prints

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-panel-win64
          path: release-win/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Build for Linux x64
  # ─────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux x64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc meson ninja-build pkg-config \
            libsdl3-dev \
            libavcodec-dev libavformat-dev \
            libavutil-dev libswresample-dev libavdevice-dev \
            libusb-1.0-0-dev libv4l-dev \
            python3

      - name: Apply side-panel patch
        run: python3 apply_panel_patch.py

      - name: Configure (meson)
        run: |
          meson setup build-linux \
            --buildtype=release \
            -Db_lto=true \
            -Dcompile_server=false

      - name: Build
        run: |
          cd build-linux
          ninja -j$(nproc)

      - name: Package
        run: |
          mkdir -p release-linux
          cp build-linux/app/scrcpy    release-linux/
          echo '{}' > release-linux/devices_data.json
          mkdir -p release-linux/Prints

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-panel-linux-x64
          path: release-linux/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Create GitHub Release (on tag push)
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Zip artifacts
        run: |
          cd scrcpy-panel-win64  && zip -r ../scrcpy-panel-win64.zip .  && cd ..
          cd scrcpy-panel-linux-x64 && tar czf ../scrcpy-panel-linux-x64.tar.gz . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "scrcpy Panel ${{ github.ref_name }}"
          body: |
            ## scrcpy com Painel Lateral

            ### Funcionalidades
            - 📱 Gaveta recolhível na direita da janela scrcpy
            - 📸 Captura de tela (salva em pasta `Prints/`)
            - 🔊 Ativar/desativar áudio para PC
            - 🔉 Controle de volume do celular
            - ← Botões de navegação (Back, Home, Recents)
            - ⚙️ Configurações salvas por dispositivo (`devices_data.json`)

            ### Como usar
            Coloque `devices_data.json` e a pasta `Prints/` na mesma pasta do executável.
          files: |
            scrcpy-panel-win64.zip
            scrcpy-panel-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
