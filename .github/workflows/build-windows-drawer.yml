# .github/workflows/build-windows-drawer.yml
# ─────────────────────────────────────────────────────────────────────
# Build do scrcpy para Windows com a gaveta retrátil integrada
# Dispara: push em qualquer branch, ou manualmente via workflow_dispatch
# ─────────────────────────────────────────────────────────────────────

name: Build Windows (Drawer)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  # Versão do prebuilt cross-compile deps (Windows x64)
  DEPS_VERSION: v4.0

jobs:
  # ────────────────────────────────────────────────────────────────────
  build-windows-x64:
  # ────────────────────────────────────────────────────────────────────
    name: Windows x64 (cross-compile from Ubuntu)
    runs-on: ubuntu-22.04

    steps:
      # 1. Checkout do seu fork
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. Instalar dependências de build
      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            meson ninja-build \
            pkg-config \
            wget unzip \
            python3-pip \
            git

      # 3. Baixar prebuilt Windows deps do Genymobile/scrcpy
      - name: Download Windows prebuilt deps
        run: |
          wget -q \
            "https://github.com/Genymobile/scrcpy/releases/download/${DEPS_VERSION}/scrcpy-win64-${DEPS_VERSION}.zip" \
            -O deps.zip
          unzip -q deps.zip -d deps_extracted
          ls deps_extracted/

      # 4. Copiar os novos arquivos C da gaveta para app/src/
      - name: Copy drawer source files
        run: |
          cp c_patches/sc_drawer.h app/src/sc_drawer.h
          cp c_patches/sc_drawer.c app/src/sc_drawer.c
          echo "[OK] Arquivos da gaveta copiados para app/src/"

      # 5. Aplicar patch de integração no meson.build
      - name: Patch meson.build to include sc_drawer
        run: |
          python3 - <<'EOF'
          import re

          with open("app/meson.build", "r") as f:
              content = f.read()

          # Verifica se já foi patcheado
          if "sc_drawer.c" in content:
              print("[SKIP] meson.build já contém sc_drawer")
              exit(0)

          # Insere sc_drawer.c após screen.c na lista de sources
          patched = re.sub(
              r"(    'src/screen\.c',\s*\n    'src/screen\.h',)",
              r"\1\n    'src/sc_drawer.c',\n    'src/sc_drawer.h',",
              content
          )

          if patched == content:
              # Fallback: tenta inserir após qualquer .c da lista
              patched = content.replace(
                  "'src/screen.c',",
                  "'src/screen.c',\n    'src/sc_drawer.c',\n    'src/sc_drawer.h',"
              )

          with open("app/meson.build", "w") as f:
              f.write(patched)

          print("[OK] meson.build atualizado")
          EOF

      # 6. Patch screen.h — adiciona sc_drawer no struct
      - name: Patch screen.h — add drawer field
        run: |
          python3 - <<'EOF'
          with open("app/src/screen.h", "r") as f:
              content = f.read()

          if "sc_drawer" in content:
              print("[SKIP] screen.h já patcheado")
              exit(0)

          # Adiciona include após #ifndef SC_SCREEN_H
          content = content.replace(
              '#ifndef SC_SCREEN_H\n#define SC_SCREEN_H',
              '#ifndef SC_SCREEN_H\n#define SC_SCREEN_H\n\n#include "sc_drawer.h"'
          )

          # Adiciona campos no struct sc_screen
          # Insere antes do campo "struct sc_input_manager im;"
          content = content.replace(
              '    struct sc_input_manager im;',
              '    /* gaveta retratil */\n'
              '    sc_drawer drawer;\n'
              '    bool      drawer_initialized;\n'
              '\n'
              '    struct sc_input_manager im;'
          )

          with open("app/src/screen.h", "w") as f:
              f.write(content)
          print("[OK] screen.h patcheado")
          EOF

      # 7. Patch screen.c — integra init/render/event/destroy da gaveta
      - name: Patch screen.c — integrate drawer
        run: |
          python3 - <<'EOF'
          with open("app/src/screen.c", "r") as f:
              content = f.read()

          if "sc_drawer_init" in content:
              print("[SKIP] screen.c já patcheado")
              exit(0)

          # ── Include ─────────────────────────────────────────────────
          content = content.replace(
              '#include "screen.h"',
              '#include "screen.h"\n#include "sc_drawer.h"'
          )

          # ── Global device_id setter ──────────────────────────────────
          SETTER = '''
/* ─ Drawer device ID (set by main before sc_screen_init) ─ */
static char g_drawer_device_id[64] = "";
void sc_screen_set_drawer_device(const char *device_id) {
    if (device_id)
        strncpy(g_drawer_device_id, device_id, sizeof(g_drawer_device_id)-1);
}
'''
          # Insere após os #includes (antes da primeira função static)
          import re
          content = re.sub(
              r'(static inline struct sc_size\nget_oriented_size)',
              SETTER + r'\1',
              content,
              count=1
          )

          # ── Init: após criação do display ───────────────────────────
          DRAWER_INIT = '''
    /* ── Gaveta retrátil ── */
    {
        SDL_Renderer *rend = SDL_GetRenderer(screen->window);
        if (rend && g_drawer_device_id[0]) {
            screen->drawer_initialized = sc_drawer_init(
                &screen->drawer,
                screen->window,
                rend,
                g_drawer_device_id);
        }
    }
'''
          # Insere antes do "return true;" final de sc_screen_init
          # (última ocorrência antes de "error_destroy_display:")
          content = content.replace(
              '    screen->frame_sink.ops = &ops;\n\n#ifndef NDEBUG\n    screen->open = false;\n#endif',
              '    screen->frame_sink.ops = &ops;\n\n#ifndef NDEBUG\n    screen->open = false;\n#endif'
              + DRAWER_INIT
          )

          # ── Render: adiciona update+render após sc_display_render ───
          DRAWER_RENDER = '''
    /* ── Gaveta: update + render ── */
    if (screen->drawer_initialized) {
        static uint32_t _last_ticks = 0;
        uint32_t now = SDL_GetTicks();
        float delta = _last_ticks ? (float)(now - _last_ticks) : 16.0f;
        _last_ticks = now;
        sc_drawer_update(&screen->drawer, delta);
        sc_drawer_render(&screen->drawer);
    }
'''
          content = content.replace(
              'sc_display_render(&screen->display, &screen->rect, screen->orientation);',
              'sc_display_render(&screen->display, &screen->rect, screen->orientation);\n' + DRAWER_RENDER
          )

          # ── Handle event: passa para gaveta primeiro ─────────────────
          DRAWER_EVENT = '''    /* ── Gaveta: intercepta eventos primeiro ── */
    if (screen->drawer_initialized) {
        if (sc_drawer_handle_event(&screen->drawer, event)) {
            return true;
        }
    }

'''
          content = content.replace(
              'bool\nsc_screen_handle_event(struct sc_screen *screen, const SDL_Event *event) {\n    switch (event->type) {',
              'bool\nsc_screen_handle_event(struct sc_screen *screen, const SDL_Event *event) {\n'
              + DRAWER_EVENT
              + '    switch (event->type) {'
          )

          # ── Destroy ──────────────────────────────────────────────────
          DRAWER_DESTROY = '''    /* ── Gaveta ── */
    if (screen->drawer_initialized) {
        sc_drawer_destroy(&screen->drawer);
        screen->drawer_initialized = false;
    }
'''
          content = content.replace(
              'void\nsc_screen_destroy(struct sc_screen *screen) {',
              'void\nsc_screen_destroy(struct sc_screen *screen) {\n' + DRAWER_DESTROY
          )

          with open("app/src/screen.c", "w") as f:
              f.write(content)
          print("[OK] screen.c patcheado")
          EOF

      # 8. Cross-compile para Windows x64
      - name: Configure (cross-compile Windows)
        run: |
          meson setup build-win \
            --cross-file cross_win64.txt \
            --buildtype release \
            -Db_lto=true \
            -Dprebuilt_server=server/scrcpy-server

      - name: Build
        run: |
          ninja -C build-win

      # 9. Prepara o pacote de release
      - name: Prepare release package
        run: |
          mkdir -p release_pkg/Prints
          cp build-win/app/scrcpy.exe release_pkg/ 2>/dev/null || true
          cp build-win/app/scrcpy.exe release_pkg/scrcpy.exe 2>/dev/null || true
          
          # Copia binários necessários (adb, etc.)
          if ls deps_extracted/*.exe 2>/dev/null; then
            cp deps_extracted/*.exe release_pkg/ 2>/dev/null || true
            cp deps_extracted/*.dll release_pkg/ 2>/dev/null || true
          fi
          
          # Overlay Python
          mkdir -p release_pkg/overlay
          cp c_patches/../overlay/scrcpy_overlay.py release_pkg/overlay/ 2>/dev/null || true
          cp c_patches/../launch.bat release_pkg/ 2>/dev/null || true
          
          # README
          cat > release_pkg/LEIA-ME.txt << 'TXT'
          scrcpy com Gaveta Retratil — wadsonribeiro/My
          ═══════════════════════════════════════════════

          MODO 1 — Nativo (integrado ao scrcpy.exe):
            Execute scrcpy.exe normalmente.
            A aba "◀" aparecerá no canto direito da tela.
            Clique para expandir/recolher a gaveta.

          MODO 2 — Python overlay (sem recompilar):
            1. Instale Python 3.10+: https://python.org
            2. Execute launch.bat
            3. Selecione o dispositivo na tela inicial

          PASTA Prints:
            Screenshots ficam em Prints/ (criada automaticamente).

          CONFIG por dispositivo:
            Salva em devices_data.json.
            Cada dispositivo tem FPS/Resolução/Bitrate independentes.

          PADRÕES:
            --max-fps=60  -m 1080  -b 8M  --stay-awake
            --gamepad=uhid  --print-fps

          TXT
          
          ls -la release_pkg/

      # 10. Upload como artifact do GitHub Actions
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-drawer-win64
          path: release_pkg/
          retention-days: 30

      # 11. (Opcional) Cria release automaticamente em tags
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_pkg/**
          body: |
            ## scrcpy com Gaveta Retrátil
            
            ### Novidades
            - Gaveta lateral retrátil (aba `◀▶` no canto direito)
            - Captura de tela → pasta `Prints/`
            - Toggle de áudio (PC ↔ celular)
            - Volume up/down via ADB
            - Botões de navegação (Voltar, Home, Recentes)
            - Configurações por dispositivo (FPS, Resolução, Bitrate)
            - Config salva em `devices_data.json` vinculada ao device ID
            - Reinicia a conexão ao salvar configurações
            
            ### Padrão de conexão
            ```
            scrcpy -s DEVICE --gamepad=uhid --print-fps --max-fps=60 --stay-awake -m 1080 -b 8M
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
